<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logga in — TendAlert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e1a; --surface: rgba(255,255,255,0.05); --border: rgba(255,255,255,0.1);
            --green: #4ade80; --text: #fff; --text-muted: rgba(255,255,255,0.6);
        }
        body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; border-bottom: 1px solid var(--border); }
        nav .logo { font-size: 1.2rem; font-weight: 800; color: var(--green); text-decoration: none; }
        nav .logo span { color: white; }
        nav a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        nav a:hover { color: var(--text); }
        .main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { width: 100%; max-width: 400px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px; }
        .card h1 { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
        .card .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; }
        .input-group { margin-bottom: 14px; }
        .input-group label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-group input { width: 100%; background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 12px 16px; color: white; font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
        .input-group input:focus { border-color: var(--green); }
        .input-group input::placeholder { color: rgba(255,255,255,0.3); }
        .error-msg { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 14px; color: #f87171; font-size: 0.85rem; margin-bottom: 14px; display: none; }
        .error-msg.show { display: block; }
        .btn { width: 100%; background: linear-gradient(135deg, var(--green), #22c55e); color: #0a1a0f; border: none; padding: 14px 24px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit; margin-top: 8px; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(10,26,15,0.3); border-top-color: #0a1a0f; border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto; }
        .btn.loading .spinner { display: block; }
        .btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .signup-link { text-align: center; color: var(--text-muted); font-size: 0.85rem; margin-top: 20px; }
        .signup-link a { color: var(--green); font-weight: 600; }
        .forgot { text-align: right; margin-bottom: 14px; }
        .forgot a { color: var(--text-muted); font-size: 0.82rem; }
        .forgot a:hover { color: var(--text); }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Tend<span>Alert</span></a>
        <a href="signup.html">Skapa konto</a>
    </nav>
    <main class="main">
        <div class="card">
            <h1>Välkommen tillbaka</h1>
            <p class="subtitle">Logga in för att se dina upphandlingar</p>
            <div id="error-msg" class="error-msg"></div>
            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label>E-post</label>
                    <input type="email" id="email" placeholder="alex@acme.se" required>
                </div>
                <div class="input-group">
                    <label>Lösenord</label>
                    <input type="password" id="password" placeholder="Ditt lösenord" required>
                </div>
                <div class="forgot"><a href="#" onclick="alert('Maila oss: hej@tendalert.se')">Glömt lösenordet?</a></div>
                <button type="submit" id="submit-btn" class="btn">
                    <span class="btn-text">Logga in</span>
                    <div class="spinner"></div>
                </button>
            </form>
            <p class="signup-link">Inget konto? <a href="signup.html">Skapa ett gratis</a></p>
        </div>
    </main>
    <script>
    function showError(msg) {
        const el = document.getElementById('error-msg');
        el.textContent = msg;
        el.classList.add('show');
    }

    function handleLogin(e) {
        e.preventDefault();
        const email = document.getElementById('email').value.trim().toLowerCase();
        const password = document.getElementById('password').value;
        const btn = document.getElementById('submit-btn');
        btn.classList.add('loading');
        btn.disabled = true;
        document.getElementById('error-msg').classList.remove('show');

        // Simulate auth check
        setTimeout(() => {
            // For demo: check if user exists in localStorage
            const stored = localStorage.getItem('tendalert_user');
            if (stored) {
                const user = JSON.parse(stored);
                if (user.email === email) {
                    localStorage.setItem('tendalert_token', 'token_' + Date.now());
                    window.location.href = 'dashboard.html';
                    return;
                }
            }
            // Demo fallback: create session anyway for any email
            const user = { id: 'user_demo', email, name: email.split('@')[0], company: 'Demo AB', plan: 'free', created_at: new Date().toISOString(), watchlist: [], ai_analyses: 0 };
            localStorage.setItem('tendalert_user', JSON.stringify(user));
            localStorage.setItem('tendalert_token', 'token_' + Date.now());
            window.location.href = 'dashboard.html';
        }, 800);
    }

    if (localStorage.getItem('tendalert_user')) {
        window.location.href = 'dashboard.html';
    }
    </script>
</body>
</html>
